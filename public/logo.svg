<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
    <style>
        .dynamic-stroke {
            stroke: #000000;
        }

        .dynamic-fill {
            fill: #000000;
        }

        .dynamic-box {
            stroke: #000000;
            fill: transparent;
        }

        @media (prefers-color-scheme: dark) {
            .dynamic-stroke {
                stroke: #ffffff;
            }

            .dynamic-fill {
                fill: #ffffff;
            }

            .dynamic-box {
                stroke: #ffffff;
                fill: transparent;
            }
        }
    </style>

    <!-- Browser window outline -->
    <rect x="20" y="28" width="216" height="200" rx="20" stroke-width="6" class="dynamic-box" />

    <!-- Browser controls line -->
    <line x1="20" y1="68" x2="236" y2="68" stroke-width="6" class="dynamic-stroke" stroke-linecap="round" />

    <!-- Browser dots -->
    <circle cx="44" cy="48" r="4.5" class="dynamic-fill" />
    <circle cx="64" cy="48" r="4.5" class="dynamic-fill" />
    <circle cx="84" cy="48" r="4.5" class="dynamic-fill" />

    <!-- Markdown Symbol centered -->
    <g transform="translate(68, 118)" class="dynamic-stroke" stroke-width="10" stroke-linecap="round"
        stroke-linejoin="round" fill="none">
        <!-- Letter M -->
        <path d="M 0 60 L 0 0 L 28 30 L 56 0 L 56 60" />

        <!-- Down Arrow -->
        <path d="M 96 0 L 96 60" />
        <path d="M 72 36 L 96 60 L 120 36" />
    </g>
</svg>